services:
  # ── FastAPI Backend (serves API + frontend static files) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Build args for Vite (baked into JS at build time)
      args:
        - VITE_API_BASE_URL=
        - VITE_PUBLIC_POSTHOG_KEY=${VITE_PUBLIC_POSTHOG_KEY}
        - VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
        - VITE_ACCESS_CODE=${VITE_ACCESS_CODE:-cag-test-2025}
    container_name: cag-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/static
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data:ro
    expose:
      - "8000"
    networks:
      - cag-network

  # ── Caddy Reverse Proxy (HTTPS + reverse proxy) ──
  caddy:
    image: caddy:2-alpine
    container_name: cag-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - cag-network

  # ── Qdrant (optional: self-hosted) ──
  # Uncomment to run Qdrant on the same VPS instead of Qdrant Cloud.
  # Set QDRANT_URL=http://qdrant:6333 in .env.production
  #
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: cag-qdrant
  #   restart: unless-stopped
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   expose:
  #     - "6333"
  #   networks:
  #     - cag-network

volumes:
  caddy_data:
  caddy_config:
  # qdrant_data:

networks:
  cag-network:
    driver: bridge
